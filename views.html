<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikViews - Earn Coins via Views</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 220px; overflow-x: hidden; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 100; }
        .top-bar h2 { font-size: 18px; font-weight: 700; color: #fe2c55; }
        .coin-box { display: flex; align-items: center; gap: 6px; background: rgba(254, 44, 85, 0.1); padding: 6px 14px; border-radius: 20px; font-weight: bold; color: #fe2c55; border: 1px solid rgba(254, 44, 85, 0.2); }

        .video-container { width: 100%; max-width: 360px; margin: 20px auto; background: #000; position: relative; aspect-ratio: 9 / 16; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #2a2a2a; }
        .video-iframe { width: 100%; height: 100%; border: none; }
        
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 5; }
        .video-overlay p { font-size: 14px; color: #aaa; margin-top: 10px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(254, 44, 85, 0.2); border-top: 4px solid #fe2c55; border-radius: 50%; animation: spin 1s linear infinite; }

        .status-panel { max-width: 360px; margin: 0 auto; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; border-radius: 12px; width: calc(100% - 30px); border: 1px solid #2a2a2a; }
        .timer-wrapper { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
        .timer-wrapper span { color: #fe2c55; font-size: 18px; font-weight: 800; }
        .reward-wrapper { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 600; color: #28a745; }

        .autoplay-control { max-width: 360px; margin: 15px auto; padding: 15px; background: #1e1e1e; border-radius: 12px; width: calc(100% - 30px); display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a2a2a; }
        .autoplay-text { display: flex; flex-direction: column; }
        .autoplay-text .title { font-size: 14px; font-weight: 600; color: #fff; }
        .autoplay-text .sub { font-size: 11px; color: #888; margin-top: 2px; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #fe2c55; }
        input:checked + .slider:before { transform: translateX(24px); }

        .action-area { max-width: 360px; margin: 20px auto; padding: 0 15px; display: flex; gap: 12px; }
        .btn-action { flex: 1; padding: 14px; border: none; border-radius: 50px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .btn-watch { background: #fe2c55; color: white; box-shadow: 0 4px 12px rgba(254,44,85,0.3); }
        .btn-watch:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        .btn-skip { background: #2a2a2a; color: #ccc; border: 1px solid #3a3a3a; }
        .btn-action:active:not(:disabled) { transform: scale(0.97); }

        .ad-container-bottom { width: 100%; min-height: 100px; display: flex; justify-content: center; align-items: center; margin: 20px auto; padding: 10px; background: #1e1e1e; border: 1px dashed #333; border-radius: 12px; max-width: 360px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2a2a2a; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 12px; transition: color 0.2s; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: #fe2c55; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>Tik<span>Views</span> Watch</h2>
        <div class="coin-box">
            <span id="user-coins">0</span>
            <i class="fa-solid fa-heart"></i>
        </div>
    </div>

    <div class="video-container">
        <div class="video-overlay" id="video-state-layer">
            <div class="spinner" id="layer-spinner"></div>
            <p id="layer-message">Searching for active campaigns...</p>
        </div>
        <iframe class="video-iframe" id="tiktok-player" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="status-panel">
        <div class="timer-wrapper">
            <i class="fa-regular fa-clock"></i>
            Time Left: <span id="countdown-timer">15</span>s
        </div>
        <div class="reward-wrapper">
            <i class="fa-solid fa-circle-dollar-to-slot"></i>
            Reward: +20 Coins
        </div>
    </div>

    <div class="autoplay-control">
        <div class="autoplay-text">
            <span class="title">Auto Play</span>
            <span class="sub">Load next automatically</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="autoplay-toggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="action-area">
        <button class="btn-action btn-skip" id="btn-skip" onclick="skipVideo()"><i class="fa-solid fa-forward"></i> Skip</button>
        <button class="btn-action btn-watch" id="btn-claim" disabled onclick="claimCoins()"><i class="fa-solid fa-gift"></i> Claim Coins</button>
    </div>

    <div class="ad-container-bottom">
        <script async="async" data-cfasync="false" src="https://pl28732749.effectivecpmnetwork.com/76a43149f69231c82a24a42b99e96cb0/invoke.js"></script>
        <div id="container-76a43149f69231c82a24a42b99e96cb0"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-rectangle-list"></i><span>Campaign</span></a>
        <a href="views.html" class="nav-item active"><i class="fa-solid fa-play"></i><span>Views</span></a>
        <a href="future.html" class="nav-item"><i class="fa-solid fa-sliders"></i><span>Future</span></a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARiMYvukztNqNFMeqR2QiOeaQvsRdAPFQ",
            authDomain: "tikview-6f823.firebaseapp.com",
            databaseURL: "https://tikview-6f823-default-rtdb.firebaseio.com",
            projectId: "tikview-6f823",
            storageBucket: "tikview-6f823.firebasestorage.app",
            messagingSenderId: "448888345970",
            appId: "1:448888345970:web:c0aaf62b31f71b1b0479eb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserUID = "";
        let userCurrentCoins = 0;
        let activeCampaignsList = [];
        let currentCampaignIndex = 0;
        let watchInterval = null;
        let timeLeft = 15;
        let isVideoCompleted = false;

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUserUID = user.uid;
                database.ref('Users/' + user.uid + '/coins').on('value', (snapshot) => {
                    userCurrentCoins = snapshot.val() || 0;
                    document.getElementById('user-coins').innerText = userCurrentCoins.toLocaleString();
                });
                fetchCampaigns();
            } else {
                window.location.href = "login.html";
            }
        });

        function fetchCampaigns() {
            showOverlayLoader(true, "Searching for campaigns...");
            database.ref('Campaigns').once('value', (snapshot) => {
                activeCampaignsList = [];
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if (data.campaignType === "views" && data.currentCount < data.requiredCount && data.userUID !== currentUserUID) {
                        activeCampaignsList.push({...data, campaignID: childSnapshot.key});
                    }
                });
                if (activeCampaignsList.length > 0) {
                    currentCampaignIndex = 0;
                    loadVideoData();
                } else {
                    showOverlayLoader(false, "No campaigns available.");
                    document.getElementById('layer-spinner').style.display = "none";
                }
            });
        }

        function loadVideoData() {
            if(currentCampaignIndex >= activeCampaignsList.length) {
                fetchCampaigns();
                return;
            }
            clearInterval(watchInterval);
            isVideoCompleted = false;
            timeLeft = 15;
            document.getElementById('countdown-timer').innerText = timeLeft;
            document.getElementById('btn-claim').disabled = true;

            const currentCampaign = activeCampaignsList[currentCampaignIndex];
            let origUrl = currentCampaign.videoLink;
            // TikTok embed URL ले autoplay र muted राख्न मद्दत गर्छ
            let embedUrl = origUrl.includes("tiktok.com") ? 
                           "https://www.tiktok.com/embed/v2/" + origUrl.split("/video/")[1].split("?")[0] + "?autoplay=1&muted=1" : origUrl;

            document.getElementById('tiktok-player').src = embedUrl;
            setTimeout(() => {
                document.getElementById('video-state-layer').style.display = "none";
                startCountdown();
            }, 1000);
        }

        function startCountdown() {
            watchInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown-timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(watchInterval);
                    isVideoCompleted = true;
                    document.getElementById('btn-claim').disabled = false;
                    
                    // Auto claim check
                    if(document.getElementById('autoplay-toggle').checked) {
                        claimCoins();
                    }
                }
            }, 1000);
        }

        function claimCoins() {
            if(!isVideoCompleted) return;
            document.getElementById('btn-claim').disabled = true;
            const currentCampaign = activeCampaignsList[currentCampaignIndex];
            
            const updates = {};
            updates['/Users/' + currentUserUID + '/coins'] = userCurrentCoins + 20;
            updates['/Campaigns/' + currentCampaign.campaignID + '/currentCount'] = (currentCampaign.currentCount || 0) + 1;
            
            database.ref().update(updates).then(() => {
                currentCampaignIndex++;
                if(document.getElementById('autoplay-toggle').checked) {
                    loadVideoData(); // Auto next
                } else {
                    showOverlayLoader(true, "Coins Credited!");
                    setTimeout(loadVideoData, 1000);
                }
            });
        }

        function skipVideo() {
            clearInterval(watchInterval);
            currentCampaignIndex++;
            showOverlayLoader(true, "Skipping...");
            setTimeout(loadVideoData, 1000);
        }

        function showOverlayLoader(showSpinner, textMessage) {
            const layer = document.getElementById('video-state-layer');
            layer.style.display = "flex";
            document.getElementById('layer-spinner').style.display = showSpinner ? "block" : "none";
            document.getElementById('layer-message').innerText = textMessage;
        }
    </script>
</body>
</html>
