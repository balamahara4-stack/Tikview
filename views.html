<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikViews PRO | Advanced Auto-Play</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS यथावत छ - थप गरिएको स्टाइल */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 220px; overflow-x: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 1px solid #2a2a2a; }
        .video-container { width: 100%; max-width: 360px; margin: 20px auto; background: #000; position: relative; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; }
        .video-iframe { width: 100%; height: 100%; border: none; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .spinner { width: 40px; height: 40px; border: 4px solid #fe2c55; border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>Tik<span>Views</span> Watch</h2>
        <div class="coin-box"><span id="user-coins">0</span> <i class="fa-solid fa-heart"></i></div>
    </div>

    <div class="video-container">
        <div class="video-overlay" id="video-state-layer">
            <div class="spinner"></div>
            <p id="layer-message">Initializing System...</p>
        </div>
        <iframe class="video-iframe" id="tiktok-player" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="status-panel">
        <div>Time Left: <span id="countdown-timer">15</span>s</div>
    </div>
    <button id="btn-claim" disabled onclick="claimCoins()">Claim Coins</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. Firebase र Global Variables Initialization
        const firebaseConfig = { /* तपाईंको उही पुरानो कन्फिगरेसन */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let state = {
            uid: "",
            coins: 0,
            campaigns: [],
            index: 0,
            timer: null,
            timeLeft: 15,
            isFinished: false
        };

        // 2. Auth State Listener
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                state.uid = user.uid;
                database.ref('Users/' + user.uid + '/coins').on('value', snap => {
                    state.coins = snap.val() || 0;
                    document.getElementById('user-coins').innerText = state.coins;
                });
                fetchData();
            } else { window.location.href = "login.html"; }
        });

        // 3. Campaign Fetching Logic
        function fetchData() {
            database.ref('Campaigns').once('value').then(snap => {
                state.campaigns = [];
                snap.forEach(child => {
                    let d = child.val();
                    if(d.campaignType === "views" && d.currentCount < d.requiredCount && d.userUID !== state.uid) {
                        state.campaigns.push({id: child.key, ...d});
                    }
                });
                loadVideo();
            });
        }

        // 4. Video Player Controller (The Heart of Auto-Play)
        function loadVideo() {
            if(state.index >= state.campaigns.length) { fetchData(); return; }
            
            const cam = state.campaigns[state.index];
            const player = document.getElementById('tiktok-player');
            
            // Auto-Play: ?autoplay=1&mute=1
            player.src = `https://www.tiktok.com/embed/v2/${cam.videoLink.split('/video/')[1].split('?')[0]}?autoplay=1&mute=1`;
            
            document.getElementById('video-state-layer').style.display = "flex";
            
            // 3 सेकेन्डको बफर टाइम (भिडियो लोड हुन)
            setTimeout(() => {
                document.getElementById('video-state-layer').style.display = "none";
                startTimer();
            }, 3000);
        }

        // 5. 15 Second Timer Logic
        function startTimer() {
            state.timeLeft = 15;
            state.isFinished = false;
            document.getElementById('countdown-timer').innerText = state.timeLeft;
            
            clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.timeLeft--;
                document.getElementById('countdown-timer').innerText = state.timeLeft;
                
                if(state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    state.isFinished = true;
                    // Auto-Add Coin Trigger
                    claimCoins(); 
                }
            }, 1000);
        }

        // 6. Secure Coin Adding Logic
        function claimCoins() {
            if(!state.isFinished) return;
            
            const cam = state.campaigns[state.index];
            const updates = {};
            updates['/Users/' + state.uid + '/coins'] = state.coins + 20;
            updates['/Campaigns/' + cam.id + '/currentCount'] = (cam.currentCount || 0) + 1;
            
            database.ref().update(updates).then(() => {
                state.index++;
                loadVideo(); // अर्को भिडियो अटोमेटिक लोड
            }).catch(e => console.log("Error:", e));
        }

        // 7. Robust Error Handling Functions
        function skipVideo() {
            clearInterval(state.timer);
            state.index++;
            loadVideo();
        }
    </script>
</body>
</html>
