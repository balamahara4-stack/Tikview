<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikViews - Premium Coin Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; padding-bottom: 120px; overflow-x: hidden; }

        /* विज्ञापनको लागि सुरक्षित कन्टेनरहरू */
        .ad-container-top { width: 100%; min-height: 60px; margin: 10px 0; text-align: center; display: flex; justify-content: center; align-items: center; background: #1e1e1e; border-bottom: 1px solid #333; }
        .ad-container-bottom { width: 100%; min-height: 100px; margin: 20px 0; text-align: center; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.02); border: 1px dashed #333; border-radius: 10px; }

        /* Header System */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1e1e1e; border-bottom: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 100; }
        .top-bar h2 { font-size: 18px; font-weight: 700; color: #fe2c55; }
        .coin-box { display: flex; align-items: center; gap: 6px; background: rgba(254, 44, 85, 0.1); padding: 6px 14px; border-radius: 20px; font-weight: bold; color: #fe2c55; border: 1px solid rgba(254, 44, 85, 0.2); }

        /* Banner Design */
        .store-banner { background: linear-gradient(135deg, #fe2c55 0%, #b01a34 100%); margin: 15px; padding: 20px; border-radius: 16px; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(254,44,85,0.2); }
        .store-banner h3 { font-size: 20px; font-weight: 800; margin-bottom: 5px; }
        .store-banner p { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.4; }
        .store-banner i { position: absolute; right: -10px; bottom: -10px; font-size: 90px; color: rgba(255,255,255,0.1); }

        .section-title { font-size: 14px; font-weight: bold; color: #888; margin: 20px 15px 10px; text-transform: uppercase; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 15px; }
        .coin-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 16px; padding: 15px; text-align: center; position: relative; transition: all 0.2s; cursor: pointer; }
        .coin-card:active { transform: scale(0.97); border-color: #fe2c55; }
        
        .card-icon { font-size: 28px; color: #ffd700; margin-bottom: 8px; }
        .card-title { font-size: 15px; font-weight: 800; }
        .card-price { background: #fe2c55; color: #fff; font-weight: bold; font-size: 13px; padding: 6px; border-radius: 30px; margin-top: 10px; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: flex-end; }
        .payment-sheet { width: 100%; background: #1e1e1e; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 25px 20px; transition: transform 0.3s; transform: translateY(100%); }
        .method-row { display: flex; align-items: center; justify-content: space-between; background: #121212; border: 1px solid #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2a2a2a; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 12px; gap: 5px; }
        .nav-item.active { color: #fe2c55; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>Tik<span>Views</span> Store</h2>
        <div class="coin-box"><span id="user-coins">0</span><i class="fa-solid fa-heart"></i></div>
    </div>

    <div id="top-ad-slot" class="ad-container-top">
        <script type="text/javascript">
            atOptions = { 'key' : '6eede0c59a7ac90fa38d5f0548f0e6a8', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/6eede0c59a7ac90fa38d5f0548f0e6a8/invoke.js"></script>
    </div>

    <div class="store-banner">
        <h3>Premium Shop</h3>
        <p>Buy instant coin packages safely.</p>
        <i class="fa-solid fa-gem"></i>
    </div>

    <div class="section-title">Select Coin Package</div>
    <div class="grid-container">
        <div class="coin-card" onclick="openPaymentSheet('5,000 Coins', 'NPR 150')">
            <div class="card-icon"><i class="fa-solid fa-coins"></i></div>
            <div class="card-title">5,000 Coins</div>
            <div class="card-price">NPR 150</div>
        </div>
        <div class="coin-card" onclick="openPaymentSheet('12,000 Coins', 'NPR 300')">
            <div class="card-icon"><i class="fa-solid fa-coins"></i></div>
            <div class="card-title">12,000 Coins</div>
            <div class="card-price">NPR 300</div>
        </div>
    </div>

    <div id="bottom-native-slot" class="ad-container-bottom">
        <script async="async" data-cfasync="false" src="https://pl28732749.effectivecpmnetwork.com/76a43149f69231c82a24a42b99e96cb0/invoke.js"></script>
        <div id="container-76a43149f69231c82a24a42b99e96cb0"></div>
    </div>

    <div class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-rectangle-list fa-lg"></i><span>Campaign</span></a>
        <a href="views.html" class="nav-item"><i class="fa-solid fa-play fa-lg"></i><span>Views</span></a>
        <a href="future.html" class="nav-item active"><i class="fa-solid fa-sliders fa-lg"></i><span>Future</span></a>
    </div>

    <div class="modal-overlay" id="payment-modal">
        <div class="payment-sheet" id="sheet-content">
            <h4 style="margin-bottom: 15px;">Select Payment Gateway</h4>
            <div class="method-row" onclick="submitDepositOrderFirebase()"><span>eSewa / Khalti / Bank</span><i class="fa-solid fa-chevron-right"></i></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARiMYvukztNqNFMeqR2QiOeaQvsRdAPFQ",
            authDomain: "tikview-6f823.firebaseapp.com",
            databaseURL: "https://tikview-6f823-default-rtdb.firebaseio.com",
            projectId: "tikview-6f823",
            storageBucket: "tikview-6f823.firebasestorage.app",
            messagingSenderId: "448888345970",
            appId: "1:448888345970:web:c0aaf62b31f71b1b0479eb"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openPaymentSheet(name, price) {
            document.getElementById('payment-modal').style.display = "flex";
            setTimeout(() => document.getElementById('sheet-content').style.transform = "translateY(0)", 10);
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                database.ref('Users/' + user.uid + '/coins').on('value', s => document.getElementById('user-coins').innerText = (s.val() || 0).toLocaleString());
            } else { window.location.href = "login.html"; }
        });

        function submitDepositOrderFirebase() {
            alert("Request Sent!");
            document.getElementById('payment-modal').style.display = "none";
        }
    </script>
</body>
</html>
